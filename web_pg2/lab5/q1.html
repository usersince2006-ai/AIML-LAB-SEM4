<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0093E9 0%, #80D0C7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            width: 450px;
            max-width: 100%;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        #taskInput {
            flex: 1;
            padding: 15px;
            border: 3px solid #0093E9;
            border-radius: 12px;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        #taskInput:focus {
            border-color: #80D0C7;
            outline: none;
            box-shadow: 0 0 20px rgba(0, 147, 233, 0.2);
        }
        #addBtn {
            background: linear-gradient(135deg, #0093E9 0%, #80D0C7 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        #addBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 147, 233, 0.3);
        }
        #addBtn:active {
            transform: translateY(0);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .stat-value {
            color: #2c3e50;
            font-size: 1.8em;
            font-weight: bold;
        }
        ul {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        li {
            display: flex;
            align-items: center;
            padding: 15px;
            margin: 10px 0;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        li:hover {
            background: #e8e9ea;
            transform: translateX(5px);
        }
        li.completed {
            opacity: 0.6;
        }
        li.completed span {
            text-decoration: line-through;
            color: #999;
        }
        li span {
            flex: 1;
            margin: 0 15px;
            font-size: 1.1em;
            color: #2c3e50;
        }
        li input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #0093E9;
        }
        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .delete-btn:hover {
            background: #ee5a5a;
            transform: scale(1.1);
        }
        .empty {
            text-align: center;
            color: #95a5a6;
            padding: 40px 20px;
            font-size: 1.2em;
        }
        .clear-all {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            margin-top: 15px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .clear-all:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        @media (max-width: 500px) {
            .container {
                padding: 25px;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 To-Do List</h1>
        <p class="subtitle">Stay organized, get things done!</p>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off">
            <button id="addBtn" onclick="addTask()">➕ Add</button>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Done</div>
                <div class="stat-value" id="doneCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Pending</div>
                <div class="stat-value" id="pendingCount">0</div>
            </div>
        </div>
        
        <ul id="taskList"></ul>
        <p class="empty" id="emptyMsg">✨ No tasks yet. Add one above to get started!</p>
        
        <button class="clear-all" id="clearBtn" onclick="clearAll()" style="display: none;">🗑️ Clear All Tasks</button>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');
        const clearBtn = document.getElementById('clearBtn');
        
        // Add task on Enter key
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
        
        function addTask() {
            const text = taskInput.value.trim();
            
            if (!text) {
                taskInput.style.borderColor = '#ff6b6b';
                taskInput.placeholder = 'Please enter a task!';
                setTimeout(() => {
                    taskInput.style.borderColor = '#0093E9';
                    taskInput.placeholder = 'Add a new task...';
                }, 2000);
                return;
            }
            
            taskInput.style.borderColor = '#0093E9';
            
            const li = document.createElement('li');
            li.innerHTML = `
                <input type="checkbox" onchange="toggleTask(this)">
                <span>${text}</span>
                <button class="delete-btn" onclick="deleteTask(this)">✕</button>
            `;
            
            taskList.appendChild(li);
            taskInput.value = '';
            taskInput.focus();
            updateStats();
        }
        
        function deleteTask(btn) {
            const li = btn.parentElement;
            li.style.animation = 'slideOut 0.3s ease';
            setTimeout(() => {
                li.remove();
                updateStats();
            }, 300);
        }
        
        function toggleTask(cb) {
            cb.parentElement.classList.toggle('completed');
            updateStats();
        }
        
        function clearAll() {
            if (confirm('Are you sure you want to clear all tasks?')) {
                taskList.innerHTML = '';
                updateStats();
            }
        }
        
        function updateStats() {
            const total = taskList.children.length;
            const done = taskList.querySelectorAll('.completed').length;
            const pending = total - done;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('doneCount').textContent = done;
            document.getElementById('pendingCount').textContent = pending;
            
            document.getElementById('emptyMsg').style.display = total ? 'none' : 'block';
            clearBtn.style.display = total ? 'block' : 'none';
        }
        
        // Add slideOut animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                to {
                    opacity: 0;
                    transform: translateX(100px);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
