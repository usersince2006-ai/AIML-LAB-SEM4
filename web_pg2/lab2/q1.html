<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Business Card</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .business-card {
      width: 450px;
      background: white;
      border-radius: 25px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      position: relative;
    }
    .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 50px 40px 80px;
      position: relative;
      text-align: center;
    }
    .card-header:after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 140px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .profile-image {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 5px solid white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      object-fit: cover;
      z-index: 10;
    }
    .company-logo {
      color: white;
      font-size: 1.8em;
      font-weight: bold;
      letter-spacing: 2px;
      opacity: 0.95;
    }
    .card-body {
      padding: 80px 40px 40px;
      text-align: center;
    }
    h1 {
      font-size: 2.2em;
      color: #2c3e50;
      margin-bottom: 8px;
      font-weight: 700;
    }
    .title {
      color: #667eea;
      font-size: 1.2em;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .company {
      color: #7f8c8d;
      font-size: 1.05em;
      margin-bottom: 30px;
      font-style: italic;
    }
    .contact-info {
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 25px;
    }
    .contact-item {
      display: flex;
      align-items: center;
      margin: 15px 0;
      color: #34495e;
      font-size: 1.05em;
    }
    .contact-item .icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-size: 1.1em;
      flex-shrink: 0;
    }
    .contact-item .text {
      flex: 1;
      text-align: left;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #dee2e6, transparent);
      margin: 20px 0;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 25px;
    }
    .social-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.3em;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }
    .social-icon:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
    }
    .qr-section {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px dashed #e9ecef;
    }
    .qr-code {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      border-radius: 10px;
      margin: 10px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3em;
    }
    .qr-text {
      color: #7f8c8d;
      font-size: 0.9em;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="business-card">
    <div class="card-header">
      <div class="company-logo">TECHVISION</div>
      <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400&q=80" alt="Profile" class="profile-image">
    </div>
    
    <div class="card-body">
      <h1>Sophia Kumar</h1>
      <p class="title">Senior Product Designer</p>
      <p class="company">TechVision Studios · Mumbai</p>
      
      <div class="contact-info">
        <div class="contact-item">
          <div class="icon">📧</div>
          <div class="text">sophia.kumar@techvision.com</div>
        </div>
        <div class="divider"></div>
        <div class="contact-item">
          <div class="icon">📱</div>
          <div class="text">+91 98765 43210</div>
        </div>
        <div class="divider"></div>
        <div class="contact-item">
          <div class="icon">🌐</div>
          <div class="text">www.sophiakumar.design</div>
        </div>
      </div>
      
      <div class="social-links">
        <a href="#" class="social-icon" title="LinkedIn">in</a>
        <a href="#" class="social-icon" title="Twitter">🐦</a>
        <a href="#" class="social-icon" title="Dribbble">🎨</a>
        <a href="#" class="social-icon" title="Behance">🅱️</a>
      </div>
      
      <div class="qr-section">
        <div class="qr-code">📱</div>
        <p class="qr-text">Scan to save contact</p>
      </div>
    </div>
  </div>
</body>
</html>
