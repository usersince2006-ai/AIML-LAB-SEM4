<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Gallery</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #1a1a2e;
      font-family: 'Arial', sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: white;
      font-size: 3em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .subtitle {
      text-align: center;
      color: #ccc;
      font-size: 1.3em;
      margin-bottom: 50px;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-bottom: 50px;
    }
    .color-box {
      height: 200px;
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }
    .color-box:hover {
      transform: translateY(-10px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .color-box:after {
      content: attr(data-color);
      position: absolute;
      bottom: 20px;
      background: rgba(0,0,0,0.7);
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.7em;
      letter-spacing: 1px;
    }
    .red { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
    .orange { background: linear-gradient(135deg, #ff9966 0%, #ff5e62 100%); }
    .yellow { background: linear-gradient(135deg, #feca57 0%, #ff9ff3 100%); }
    .green { background: linear-gradient(135deg, #48c6ef 0%, #6f86d6 100%); }
    .blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .purple { background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%); }
    .pink { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .teal { background: linear-gradient(135deg, #17ead9 0%, #6078ea 100%); }
    .mint { background: linear-gradient(135deg, #96fbc4 0%, #f9f586 100%); }
    .coral { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .lavender { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
    .sunset { background: linear-gradient(135deg, #fa8bff 0%, #2bd2ff 90%, #2bff88 100%); }
    .gradient-showcase {
      margin-top: 50px;
      text-align: center;
    }
    .gradient-showcase h2 {
      color: white;
      font-size: 2em;
      margin-bottom: 30px;
    }
    .gradient-large {
      height: 300px;
      border-radius: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 75%, #4facfe 100%);
      margin-bottom: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gradient-text {
      font-size: 3em;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Color Palette Gallery</h1>
    <p class="subtitle">Explore beautiful color gradients</p>
    
    <div class="color-grid">
      <div class="color-box red" data-color="#FF6B6B">Red Passion</div>
      <div class="color-box orange" data-color="#FF9966">Orange Sunset</div>
      <div class="color-box yellow" data-color="#FECA57">Golden Yellow</div>
      <div class="color-box green" data-color="#48C6EF">Ocean Green</div>
      <div class="color-box blue" data-color="#4FACFE">Sky Blue</div>
      <div class="color-box purple" data-color="#A8C0FF">Royal Purple</div>
      <div class="color-box pink" data-color="#F093FB">Pink Blush</div>
      <div class="color-box teal" data-color="#17EAD9">Tropical Teal</div>
      <div class="color-box mint" data-color="#96FBC4">Fresh Mint</div>
      <div class="color-box coral" data-color="#FA709A">Coral Reef</div>
      <div class="color-box lavender" data-color="#A1C4FD">Soft Lavender</div>
      <div class="color-box sunset" data-color="#FA8BFF">Rainbow Sunset</div>
    </div>
    
    <div class="gradient-showcase">
      <h2>Featured Gradient</h2>
      <div class="gradient-large">
        <div class="gradient-text">Beautiful Colors</div>
      </div>
    </div>
  </div>
</body>
</html>
