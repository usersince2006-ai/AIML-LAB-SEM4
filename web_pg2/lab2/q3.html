<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Form</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #fc5c7d 0%, #6a82fb 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .form-container {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .form-header {
      background: linear-gradient(135deg, #fc5c7d 0%, #6a82fb 100%);
      color: white;
      padding: 40px;
      text-align: center;
    }
    .form-header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .form-header p {
      font-size: 1.1em;
      opacity: 0.95;
    }
    .form-body {
      padding: 40px;
    }
    .form-section {
      margin-bottom: 35px;
    }
    .section-title {
      color: #fc5c7d;
      font-size: 1.4em;
      margin-bottom: 20px;
      border-bottom: 2px solid #fc5c7d;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 600;
      font-size: 1.05em;
    }
    .required {
      color: #e74c3c;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #fc5c7d;
      box-shadow: 0 0 0 3px rgba(252, 92, 125, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .radio-group,
    .checkbox-group {
      margin-top: 10px;
    }
    .radio-option,
    .checkbox-option {
      margin: 10px 0;
      display: flex;
      align-items: center;
    }
    input[type="radio"],
    input[type="checkbox"] {
      margin-right: 10px;
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #fc5c7d 0%, #6a82fb 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.3s ease;
      margin-top: 20px;
    }
    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(252, 92, 125, 0.3);
    }
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="form-header">
      <h1>💼 Job Application</h1>
      <p>Join Our Amazing Team</p>
    </div>
    
    <div class="form-body">
      <form>
        <!-- Personal Information -->
        <div class="form-section">
          <h2 class="section-title">Personal Information</h2>
          
          <div class="form-row">
            <div class="form-group">
              <label>First Name <span class="required">*</span></label>
              <input type="text" required placeholder="Enter first name">
            </div>
            <div class="form-group">
              <label>Last Name <span class="required">*</span></label>
              <input type="text" required placeholder="Enter last name">
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>Email <span class="required">*</span></label>
              <input type="email" required placeholder="your.email@example.com">
            </div>
            <div class="form-group">
              <label>Phone Number <span class="required">*</span></label>
              <input type="tel" required placeholder="+91 xxxxx xxxxx">
            </div>
          </div>
          
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date">
          </div>
        </div>
        
        <!-- Position Details -->
        <div class="form-section">
          <h2 class="section-title">Position Details</h2>
          
          <div class="form-group">
            <label>Position Applied For <span class="required">*</span></label>
            <select required>
              <option value="">-- Select Position --</option>
              <option value="frontend">Frontend Developer</option>
              <option value="backend">Backend Developer</option>
              <option value="fullstack">Full Stack Developer</option>
              <option value="designer">UI/UX Designer</option>
              <option value="pm">Product Manager</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Years of Experience</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" name="experience" value="fresher">
                <label>Fresher (0-1 years)</label>
              </div>
              <div class="radio-option">
                <input type="radio" name="experience" value="junior">
                <label>Junior (1-3 years)</label>
              </div>
              <div class="radio-option">
                <input type="radio" name="experience" value="mid">
                <label>Mid-level (3-5 years)</label>
              </div>
              <div class="radio-option">
                <input type="radio" name="experience" value="senior">
                <label>Senior (5+ years)</label>
              </div>
            </div>
          </div>
          
          <div class="form-group">
            <label>Skills <span class="required">*</span></label>
            <div class="checkbox-group">
              <div class="checkbox-option">
                <input type="checkbox" value="html">
                <label>HTML/CSS</label>
              </div>
              <div class="checkbox-option">
                <input type="checkbox" value="js">
                <label>JavaScript</label>
              </div>
              <div class="checkbox-option">
                <input type="checkbox" value="react">
                <label>React</label>
              </div>
              <div class="checkbox-option">
                <input type="checkbox" value="python">
                <label>Python</label>
              </div>
              <div class="checkbox-option">
                <input type="checkbox" value="sql">
                <label>SQL</label>
              </div>
            </div>
          </div>
        </div>
        
        <!-- Additional Information -->
        <div class="form-section">
          <h2 class="section-title">Additional Information</h2>
          
          <div class="form-group">
            <label>Cover Letter</label>
            <textarea placeholder="Tell us why you'd be a great fit for this role..."></textarea>
          </div>
          
          <div class="form-group">
            <label>LinkedIn Profile</label>
            <input type="text" placeholder="https://linkedin.com/in/yourprofile">
          </div>
        </div>
        
        <button type="submit" class="submit-btn">Submit Application</button>
      </form>
    </div>
  </div>
</body>
</html>
