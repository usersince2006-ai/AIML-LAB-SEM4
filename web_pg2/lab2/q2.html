<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Task Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .todo-container {
      width: 500px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
    }
    .header p {
      opacity: 0.9;
      font-size: 1.1em;
    }
    .todo-list {
      padding: 30px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      padding: 18px;
      margin-bottom: 12px;
      background: #f8f9fa;
      border-radius: 12px;
      border-left: 4px solid #11998e;
      transition: all 0.3s ease;
    }
    .todo-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }
    .todo-item.completed {
      opacity: 0.6;
      border-left-color: #38ef7d;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
    }
    .checkbox {
      width: 24px;
      height: 24px;
      border: 2px solid #11998e;
      border-radius: 6px;
      margin-right: 15px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }
    .checkbox.checked {
      background: #38ef7d;
      border-color: #38ef7d;
    }
    .checkbox.checked:after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-weight: bold;
    }
    .todo-text {
      flex: 1;
      color: #2c3e50;
      font-size: 1.05em;
    }
    .priority {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
      margin-left: 10px;
    }
    .priority.high {
      background: #fee;
      color: #e74c3c;
    }
    .priority.medium {
      background: #fff3cd;
      color: #f39c12;
    }
    .priority.low {
      background: #e8f5e9;
      color: #27ae60;
    }
    .add-task {
      padding: 20px 30px;
      background: #f8f9fa;
      border-top: 1px solid #dee2e6;
    }
    .add-task input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }
    .add-task input:focus {
      outline: none;
      border-color: #11998e;
    }
  </style>
</head>
<body>
  <div class="todo-container">
    <div class="header">
      <h1>📝 Daily Tasks</h1>
      <p>Stay organized, stay productive</p>
    </div>
    
    <div class="todo-list">
      <div class="todo-item completed">
        <div class="checkbox checked"></div>
        <div class="todo-text">Review morning emails</div>
        <span class="priority medium">Medium</span>
      </div>
      
      <div class="todo-item">
        <div class="checkbox"></div>
        <div class="todo-text">Complete project proposal</div>
        <span class="priority high">High</span>
      </div>
      
      <div class="todo-item">
        <div class="checkbox"></div>
        <div class="todo-text">Team meeting at 2 PM</div>
        <span class="priority high">High</span>
      </div>
      
      <div class="todo-item completed">
        <div class="checkbox checked"></div>
        <div class="todo-text">Update website content</div>
        <span class="priority low">Low</span>
      </div>
      
      <div class="todo-item">
        <div class="checkbox"></div>
        <div class="todo-text">Call client about requirements</div>
        <span class="priority medium">Medium</span>
      </div>
      
      <div class="todo-item">
        <div class="checkbox"></div>
        <div class="todo-text">Submit expense report</div>
        <span class="priority low">Low</span>
      </div>
    </div>
    
    <div class="add-task">
      <input type="text" placeholder="➕ Add new task...">
    </div>
  </div>
</body>
</html>
