<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React State - Login Form</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; }
        h1 { text-align: center; color: white; margin-bottom: 40px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .app-container { max-width: 550px; margin: 0 auto; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card h2 { color: #667eea; margin-bottom: 25px; font-size: 2em; text-align: center; }
        input { width: 100%; padding: 15px; margin: 12px 0; border: 3px solid #ddd; border-radius: 12px; font-size: 1.05em; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 20px rgba(102, 126, 234, 0.2); }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 35px; border-radius: 12px; cursor: pointer; margin: 8px 5px 0; font-size: 1.1em; font-weight: 600; transition: all 0.3s ease; width: calc(100% - 10px); }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        button:active { transform: translateY(0); }
        .welcome { margin-top: 20px; padding: 25px; background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); border-radius: 12px; border-left: 5px solid #2ecc71; }
        .welcome p { margin: 10px 0; font-size: 1.1em; color: #2c3e50; }
        .error { color: #ff6b6b; font-size: 0.95em; margin-top: 8px; animation: shake 0.3s ease; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .logout-btn { background: #ff6b6b; }
        .logout-btn:hover { background: #ee5a5a; box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function LoginForm() {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [loggedIn, setLoggedIn] = useState(false);
            const [error, setError] = useState('');
            const [loginTime, setLoginTime] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (username.length < 3) {
                    setError('⚠️ Username must be at least 3 characters');
                    return;
                }
                if (password.length < 6) {
                    setError('⚠️ Password must be at least 6 characters');
                    return;
                }
                setError('');
                setLoggedIn(true);
                setLoginTime(new Date().toLocaleString());
            };

            const handleLogout = () => {
                setLoggedIn(false);
                setUsername('');
                setPassword('');
                setError('');
            };

            if (loggedIn) {
                return (
                    <div className="app-container">
                        <h1>⚛️ React State Management</h1>
                        <div className="card">
                            <h2>✅ Welcome!</h2>
                            <div className="welcome">
                                <p>👤 <strong>Logged in as:</strong> {username}</p>
                                <p>🕒 <strong>Login Time:</strong> {loginTime}</p>
                                <p>✨ <strong>Status:</strong> Active Session</p>
                            </div>
                            <button onClick={handleLogout} className="logout-btn">🚪 Logout</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-container">
                    <h1>⚛️ React State Management</h1>
                    <div className="card">
                        <h2>🔐 Login Form</h2>
                        <form onsubmit={handleLogin}>
                            <input
                                type="text"
                                placeholder="👤 Username (min 3 characters)"
                                value={username}
                                onChange={(e) => setUsername(e.target.value)}
                                autoComplete="off"
                            />
                            <input
                                type="password"
                                placeholder="🔒 Password (min 6 characters)"
                                value={password}
                                onChange={(e) => setPassword(e.target.value)}
                                autoComplete="off"
                            />
                            {error && <p className="error">{error}</p>}
                            <button type="submit" onClick={handleLogin}>🚀 Login</button>
                        </form>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<LoginForm />);
    </script>
</body>
</html>
