<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React State - Counter & Controlled Input</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); min-height: 100vh; padding: 40px 20px; }
        h1 { text-align: center; color: white; margin-bottom: 40px; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .app-container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); margin-bottom: 25px; }
        .card h2 { color: #11998e; margin-bottom: 25px; font-size: 2em; text-align: center; }
        .card h3 { color: #2c3e50; margin: 20px 0 15px; font-size: 1.4em; }
        input { width: 100%; padding: 15px; margin: 12px 0; border: 3px solid #ddd; border-radius: 12px; font-size: 1.05em; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: #11998e; box-shadow: 0 0 20px rgba(17, 153, 142, 0.2); }
        input[type="number"] { width: 100px; display: inline-block; text-align: center; }
        button { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; margin: 8px 5px; font-size: 1.1em; font-weight: 600; transition: all 0.3s ease; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4); }
        button:active { transform: translateY(0); }
        .counter { text-align: center; padding: 20px; }
        .counter .count { font-size: 4.5em; color: #11998e; font-weight: bold; margin: 25px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .counter .step-control { margin: 20px 0; }
        .counter .step-control label { font-size: 1.2em; color: #2c3e50; font-weight: 600; margin-right: 10px; }
        .btn-reset { background: #95a5a6; }
        .btn-reset:hover { background: #7f8c8d; box-shadow: 0 10px 30px rgba(149, 165, 166, 0.4); }
        .user-info { margin-top: 20px; padding: 25px; background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); border-radius: 12px; border-left: 5px solid #2ecc71; animation: slideIn 0.3s ease; }
        .user-info p { margin: 10px 0; font-size: 1.1em; color: #2c3e50; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        hr { margin: 30px 0; border: none; border-top: 2px solid #f0f2f5; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function CounterApp() {
            const [count, setCount] = useState(0);
            const [step, setStep] = useState(1);
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [submitted, setSubmitted] = useState(false);

            return (
                <div className="app-container">
                    <h1>⚛️ React State Management</h1>
                    <div className="card">
                        <h2>🔢 Counter App</h2>
                        <div className="counter">
                            <div className="count">{count}</div>
                            <div className="step-control">
                                <label>Step Size:</label>
                                <input
                                    type="number"
                                    value={step}
                                    onChange={(e) => setStep(Number(e.target.value) || 1)}
                                    min="1"
                                    max="100"
                                />
                            </div>
                            <div style={{marginTop: '20px'}}>
                                <button onClick={() => setCount(count - step)}>➖ Decrease by {step}</button>
                                <button onClick={() => setCount(0)} className="btn-reset">🔄 Reset</button>
                                <button onClick={() => setCount(count + step)}>➕ Increase by {step}</button>
                            </div>
                        </div>

                        <hr />

                        <h3>📝 Controlled Input Form</h3>
                        <input
                            type="text"
                            placeholder="👤 Enter your name"
                            value={name}
                            onChange={(e) => setName(e.target.value)}
                            autoComplete="off"
                        />
                        <input
                            type="email"
                            placeholder="📧 Enter your email"
                            value={email}
                            onChange={(e) => setEmail(e.target.value)}
                            autoComplete="off"
                        />
                        <button
                            onClick={() => {
                                if (name.trim() && email.trim()) {
                                    setSubmitted(true);
                                } else {
                                    alert('⚠️ Please fill in both fields!');
                                }
                            }}
                        >
                            ✨ Submit
                        </button>
                        {submitted && (
                            <div className="user-info">
                                <p>✅ <strong>Form Submitted Successfully!</strong></p>
                                <p>👤 <strong>Name:</strong> {name}</p>
                                <p>📧 <strong>Email:</strong> {email}</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<CounterApp />);
    </script>
</body>
</html>
