<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greeting Generator - JavaScript Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px 80px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        input {
            width: 100%;
            padding: 18px;
            font-size: 1.2em;
            border: 3px solid #FF6B6B;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #FFE66D;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
        }
        button {
            background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3em;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #greetOutput {
            margin-top: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            font-size: 1.5em;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }
        #greetOutput:empty {
            background: #f0f2f5;
            box-shadow: none;
        }
        #greetOutput:empty:before {
            content: 'Your greeting will appear here...';
            color: #95a5a6;
            font-size: 1em;
        }
        .emoji {
            font-size: 2em;
            margin-right: 15px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            h1 {
                font-size: 2em;
            }
            button, input {
                font-size: 1em;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Greeting Generator</h1>
        <p class="subtitle">JavaScript Event-Driven Programming</p>
        
        <input type="text" id="nameInput" placeholder="Enter your name..." autocomplete="off">
        <button onclick="greet()">✨ Greet Me!</button>
        
        <div id="greetOutput"></div>
    </div>

    <script>
        function greet() {
            const name = document.getElementById('nameInput').value.trim();
            const hour = new Date().getHours();
            
            let greeting, emoji;
            if (hour < 12) {
                greeting = 'Good Morning';
                emoji = '🌅';
            } else if (hour < 17) {
                greeting = 'Good Afternoon';
                emoji = '☀️';
            } else {
                greeting = 'Good Evening';
                emoji = '🌙';
            }
            
            const output = document.getElementById('greetOutput');
            
            if (name) {
                output.innerHTML = `<span class="emoji">${emoji}</span><div><strong>${greeting}, ${name}!</strong><br>Welcome to my portfolio.</div>`;
            } else {
                output.innerHTML = `<div>Please enter your name! 😊</div>`;
            }
        }
        
        // Allow Enter key to submit
        document.getElementById('nameInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                greet();
            }
        });
    </script>
</body>
</html>
