<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter - JavaScript Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px 80px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        .counter-display {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            font-size: 5em;
            font-weight: bold;
            padding: 40px;
            border-radius: 20px;
            margin: 30px 0;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
            transition: all 0.3s ease;
        }
        .counter-display.animate {
            transform: scale(1.1);
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        button:hover {
            background: #34495e;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        button:active {
            transform: translateY(0);
        }
        .increment {
            background: #27ae60;
        }
        .increment:hover {
            background: #229954;
        }
        .decrement {
            background: #e74c3c;
        }
        .decrement:hover {
            background: #c0392b;
        }
        .reset {
            background: #3498db;
        }
        .reset:hover {
            background: #2980b9;
        }
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            .counter-display {
                font-size: 3.5em;
                padding: 30px;
            }
            button {
                padding: 12px 25px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 Click Counter</h1>
        <p class="subtitle">JavaScript Event-Driven Programming</p>
        
        <div class="counter-display" id="counter">0</div>
        
        <div class="button-group">
            <button class="increment" onclick="increment()">➕ Increment</button>
            <button class="decrement" onclick="decrement()">➖ Decrement</button>
            <button class="reset" onclick="resetCounter()">🔄 Reset</button>
        </div>
    </div>

    <script>
        let count = 0;
        
        function animateCounter() {
            const display = document.getElementById('counter');
            display.classList.add('animate');
            setTimeout(() => display.classList.remove('animate'), 300);
        }
        
        function increment() {
            count++;
            document.getElementById('counter').textContent = count;
            animateCounter();
        }
        
        function decrement() {
            count--;
            document.getElementById('counter').textContent = count;
            animateCounter();
        }
        
        function resetCounter() {
            count = 0;
            document.getElementById('counter').textContent = count;
            animateCounter();
        }
    </script>
</body>
</html>
