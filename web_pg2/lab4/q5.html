<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Log - JavaScript Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px 80px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 700px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        input {
            width: 100%;
            padding: 20px;
            font-size: 1.3em;
            border: 3px solid #8E2DE2;
            border-radius: 12px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #4A00E0;
            box-shadow: 0 0 20px rgba(142, 45, 226, 0.3);
        }
        #output {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
        }
        .event-item {
            background: white;
            padding: 15px 20px;
            margin: 10px 0;
            border-left: 5px solid #8E2DE2;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .event-time {
            color: #8E2DE2;
            font-weight: bold;
            font-size: 0.9em;
            margin-right: 10px;
        }
        .event-key {
            display: inline-block;
            background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: bold;
            margin: 0 5px;
        }
        .event-type {
            color: #7f8c8d;
            font-size: 0.85em;
            margin-top: 5px;
        }
        .clear-btn {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin-top: 20px;
        }
        .clear-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3);
        }
        #output:empty:before {
            content: '⌨️ Start typing to see keyboard events...';
            color: #95a5a6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            font-size: 1.1em;
        }
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⌨️ Event Log</h1>
        <p class="subtitle">JavaScript Event-Driven Programming</p>
        
        <input type="text" 
               id="eventInput" 
               placeholder="Type here to trigger events..." 
               onkeyup="logEvent(event)"
               autocomplete="off">
        
        <div id="output"></div>
        
        <button class="clear-btn" onclick="clearLog()">🗑️ Clear Log</button>
    </div>

    <script>
        let eventCount = 0;
        
        function logEvent(event) {
            eventCount++;
            const output = document.getElementById('output');
            const time = new Date().toLocaleTimeString();
            
            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';
            
            let keyDisplay = event.key;
            if (event.key === ' ') keyDisplay = 'Space';
            if (event.key === 'Enter') keyDisplay = 'Enter';
            if (event.key === 'Backspace') keyDisplay = 'Backspace';
            
            eventItem.innerHTML = `
                <div>
                    <span class="event-time">${time}</span>
                    Event #${eventCount}: Key pressed → 
                    <span class="event-key">${keyDisplay}</span>
                </div>
                <div class="event-type">
                    Type: ${event.type} | Code: ${event.code} | Key: ${event.key}
                </div>
            `;
            
            output.insertBefore(eventItem, output.firstChild);
            
            // Limit to 20 events
            while (output.children.length > 20) {
                output.removeChild(output.lastChild);
            }
        }
        
        function clearLog() {
            document.getElementById('output').innerHTML = '';
            document.getElementById('eventInput').value = '';
            eventCount = 0;
        }
    </script>
</body>
</html>
