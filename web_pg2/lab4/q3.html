<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator - JavaScript Events</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 60px 80px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 550px;
            width: 100%;
        }
        h1 {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 40px;
        }
        .calc-row {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
            justify-content: center;
        }
        input[type="number"] {
            width: 150px;
            padding: 18px;
            font-size: 1.3em;
            border: 3px solid #11998e;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s ease;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #38ef7d;
            box-shadow: 0 0 20px rgba(17, 153, 142, 0.3);
        }
        select {
            padding: 18px 15px;
            font-size: 1.5em;
            border: 3px solid #11998e;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        select:focus {
            outline: none;
            border-color: #38ef7d;
        }
        button {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.3em;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(17, 153, 142, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #result {
            margin-top: 30px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            font-size: 2.5em;
            font-weight: bold;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }
        #result:empty {
            background: #f0f2f5;
            box-shadow: none;
        }
        #result:empty:before {
            content: '= ?';
            color: #95a5a6;
            font-size: 0.6em;
        }
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
            }
            .calc-row {
                flex-direction: column;
            }
            input[type="number"] {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Simple Calculator</h1>
        <p class="subtitle">JavaScript Event-Driven Programming</p>
        
        <div class="calc-row">
            <input type="number" id="num1" placeholder="Number 1" value="">
            <select id="operator">
                <option value="+">+</option>
                <option value="-">−</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <input type="number" id="num2" placeholder="Number 2" value="">
        </div>
        
        <button onclick="calculate()">🔢 Calculate</button>
        
        <div id="result"></div>
    </div>

    <script>
        function calculate() {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const operator = document.getElementById('operator').value;
            const resultDiv = document.getElementById('result');
            
            if (isNaN(num1) || isNaN(num2)) {
                resultDiv.textContent = 'Please enter valid numbers!';
                resultDiv.style.background = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';
                return;
            }
            
            let result;
            switch(operator) {
                case '+': result = num1 + num2; break;
                case '-': result = num1 - num2; break;
                case '*': result = num1 * num2; break;
                case '/':
                    if (num2 === 0) {
                        resultDiv.textContent = 'Cannot divide by zero!';
                        resultDiv.style.background = 'linear-gradient(135deg, #e74c3c 0%, #c0392b 100%)';
                        return;
                    }
                    result = num1 / num2;
                    break;
            }
            
            result = Math.round(result * 100000) / 100000; // Round to 5 decimals
            resultDiv.textContent = `= ${result}`;
            resultDiv.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }
        
        // Allow Enter key to calculate
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    calculate();
                }
            });
        });
    </script>
</body>
</html>
