<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Props - Dynamic Portfolio</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); min-height: 100vh; }
        .header { background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%); color: white; padding: 60px 20px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        .header h1 { font-size: 3em; margin-bottom: 10px; }
        .header p { font-size: 1.3em; opacity: 0.95; }
        .section { max-width: 1000px; margin: 40px auto; padding: 35px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); }
        .section h2 { color: #FF6B6B; border-bottom: 3px solid #FFE66D; padding-bottom: 12px; margin-bottom: 25px; font-size: 2em; }
        .section p { line-height: 1.8; color: #555; font-size: 1.1em; }
        .profile-card { display: flex; gap: 25px; align-items: center; padding: 25px; background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%); border-radius: 15px; margin: 15px 0; transition: all 0.3s ease; border: 2px solid #f0f2f5; }
        .profile-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255, 107, 107, 0.15); border-color: #FFE66D; }
        .profile-card .avatar { width: 90px; height: 90px; border-radius: 50%; background: linear-gradient(135deg, #FF6B6B 0%, #FFE66D 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 2.2em; font-weight: bold; box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3); }
        .profile-card .info h3 { color: #2c3e50; margin-bottom: 8px; font-size: 1.4em; }
        .profile-card .info p { color: #666; font-size: 1.05em; }
        .footer { text-align: center; padding: 30px; background: #2c3e50; color: white; margin-top: 40px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        // Functional Component with Props: Profile
        function Profile({ name, role }) {
            return (
                <header className="header">
                    <h1>👤 {name}</h1>
                    <p>{role}</p>
                </header>
            );
        }

        // Class Component with Props: About
        class About extends React.Component {
            render() {
                return (
                    <section className="section">
                        <h2>📖 About Me</h2>
                        <p>{this.props.description}</p>
                    </section>
                );
            }
        }

        // Functional Component with Props: TeamMember
        function TeamMember({ name, role, initial }) {
            return (
                <div className="profile-card">
                    <div className="avatar">{initial}</div>
                    <div className="info">
                        <h3>{name}</h3>
                        <p>🎯 {role}</p>
                    </div>
                </div>
            );
        }

        // Team Section using Props
        function Team({ members }) {
            return (
                <section className="section">
                    <h2>👥 Team</h2>
                    {members.map((m, i) => (
                        <TeamMember key={i} name={m.name} role={m.role} initial={m.name[0]} />
                    ))}
                </section>
            );
        }

        function Footer({ year }) {
            return <footer className="footer"><p>© {year} Tony Rodrigues | Props Demo with React ⚛️</p></footer>;
        }

        // App: Passing Props from Parent to Children
        function App() {
            const teamMembers = [
                { name: "Tony Rodrigues", role: "Lead Developer & ML Engineer" },
                { name: "Amit Kumar", role: "UI/UX Designer" },
                { name: "Sarah Chen", role: "Backend Developer" },
                { name: "Mike Johnson", role: "Data Scientist" }
            ];

            return (
                <div>
                    <Profile name="Tony Rodrigues" role="SE AIML Student | Web Developer | React Enthusiast" />
                    <About description="I am a second-year AIML engineering student at SFIT, passionate about machine learning and web development. This page demonstrates passing data between React components using props - a core concept in React that enables component communication and reusability." />
                    <Team members={teamMembers} />
                    <Footer year={2026} />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
